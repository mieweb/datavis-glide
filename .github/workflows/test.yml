name: Test

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  build:

    runs-on: [ self-hosted ]

    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Build docs in container
      uses: ./.github/actions/container
      with:
        task: make build-docs
