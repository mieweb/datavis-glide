name: Publish Docs

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: [ self-hosted ]

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: make setup
      
    - name: Build docs
      run: make doc
      
    - name: Publish docs
      run: make doc-publish
