<html>
	<head>
		<meta charset="utf-8"/>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.8.3/underscore-min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/numeral.js/2.0.4/numeral.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.17.1/moment.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/chosen/1.6.2/chosen.jquery.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/2.4.4/flatpickr.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/progressbar.js/1.0.1/progressbar.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/sprintf/1.0.3/sprintf.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.sumoselect/3.0.2/jquery.sumoselect.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/jit/2.0.2/jit.js"></script>
		<script src="tabletool.js"></script>
		<script src="wcdatavis.js"></script>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"/>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chosen/1.6.2/chosen.css"/>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/2.4.4/flatpickr.css"/>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.css"/>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery.sumoselect/3.0.2/sumoselect.min.css"/>
		<link rel="stylesheet" href="wcdatavis-extra.css"/>
		<link rel="stylesheet" href="wcdatavis.css"/>
		<link rel="stylesheet" href="tabletool.css"/>
		<script>
$(document).ready(function () {
	MIE.DEBUGGING = true;

	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: 'redmine1.json'
	});
	var view = new MIE.WC_DataVis.View(source, 'Example');
	new MIE.WC_DataVis.Graph('graph', view, {
		title: 'JavaScript InfoVis Toolkit Example',
		type: 'bar',
		categoryField: 'Employee',
		valueField: 'Hours Reported',
		height: 600,
		options: {
			orientation: 'vertical'
		}
	});
	new MIE.WC_DataVis.Grid('grid', view, {
		id: 'grid',
		table: {
			features: {
				sort: true,
				filter: true,
				group: true,
				pivot: true,
				limit: true
			},
			limit: {
				threshold: 100,
				chunkSize: 50
			}
		},
		source: source
	}, {
		title: 'Example Data',
		runImmediately: true
	});
});
		</script>
	</head>
	<body>
		<div id="graph" style="height: 600px; background-color: #000"></div>
		<div id="grid"></div>
	</body>
</html>
