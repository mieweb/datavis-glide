		<script>
$(document).ready(function () {
	MIE.DEBUGGING = true;

	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: '../test/random500.json'
	});

	var view = new MIE.WC_DataVis.View(source, 'Kitchen Sink');
	new MIE.WC_DataVis.Grid('grid', view, {
		id: 'grid',
		table: {
			features: {
				rowSelect: true,
				floatingHeader: false,
				limit: true,
			},
			floatingHeader: {
				method: 'floatThead'
			},
			limit: {
				threshold: 50,
			},
		},
		source: source
	}, {
		title: 'Not Fruit Sales',
		showControls: true
	});
});
		</script>

		<div id="grid"></div>
