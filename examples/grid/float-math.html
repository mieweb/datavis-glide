<html>
	<head>
		<meta charset="utf-8"/>

		<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.2.4/flatpickr.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/4.6.1/papaparse.min.js"></script>

		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"/>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.css"/>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery-contextmenu/2.6.3/jquery.contextMenu.min.css"/>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery.sumoselect/3.0.2/sumoselect.min.css"/>

		<link rel="stylesheet" href="../base.css"/>
		<link rel="stylesheet" href="../wcdatavis.css"/>
		<link rel="stylesheet" href="../tabletool.css"/>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.8.3/underscore-min.js"></script>
		<script>
$(document).ready(function () {
	MIE.DEBUGGING = true;

	var data = new MIE.WC_DataVis.Util.EagerPipeline(function () {
		var n = (Math.random() * 10).toFixed(2);
		return [+n, -1 * n];
	}).andThenCurry(_.times, 50)
		.andThen(_.flatten)
		.andThen(_.sortBy)
		.andThenCurry(_.map, '#', function (x) { return '$' + x; })
		.andThenCurry(_.map, '#', function (x) { return { 'Dummy': 'Dummy', 'Numeral': x, 'Primitive': x, 'BigNumber': x }; })
		.done();
	console.log(data);

	window.localData = {
		data: data,
		typeInfo: {
			'Dummy': {
				type: 'string'
			},
			'Numeral': {
				internalType: 'numeral'
			},
			'Primitive': {
				internalType: 'primitive'
			},
			'BigNumber': {
				internalType: 'bignumber'
			}
		}
	};

	var source = new MIE.WC_DataVis.Source({
		type: 'local',
		varName: 'localData'
	});

	var view = new MIE.WC_DataVis.View(source, 'EXAMPLE: Float Math');
	new MIE.WC_DataVis.Grid('grid', view, {
		id: 'grid',
		source: source,
		table: {
			groupMode: 'summary'
		}
	}, {
		title: 'Float Math',
		showControls: true
	});
});
		</script>
	</head>
	<body>
		<div id="grid"></div>
	</body>
</html>
