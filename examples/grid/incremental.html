	MIE.DEBUGGING = true;

	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: '../test/random10000.json'
	});

	var view = new MIE.WC_DataVis.View(source, 'Incremental');
	new MIE.WC_DataVis.Grid('grid', view, {
		id: 'grid',
		table: {

				incremental: true
			}
		},
		source: source
	}, {
		title: 'Incremental'
	});
});
