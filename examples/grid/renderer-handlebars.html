	<head>

		<script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.blockUI/2.70/jquery.blockUI.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-contextmenu/2.6.3/jquery.contextMenu.min.js"></script>

		<script src="https://cdnjs.cloudflare.com/ajax/libs/floatthead/2.0.3/jquery.floatThead.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.2.4/flatpickr.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/4.6.1/papaparse.min.js"></script>

		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"/>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.css"/>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery-contextmenu/2.6.3/jquery.contextMenu.min.css"/>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery.sumoselect/3.0.2/sumoselect.min.css"/>

		<link rel="stylesheet" href="../base.css"/>
		<link rel="stylesheet" href="../wcdatavis.css"/>
		<link rel="stylesheet" href="../tabletool.css"/>
		<script>
$(document).ready(function () {
	MIE.DEBUGGING = true;

	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: '../fuel-economy.csv'
	});

	var view = new MIE.WC_DataVis.View(source, 'Kitchen Sink');
	new MIE.WC_DataVis.Grid('grid', view, {
		id: 'grid',
		renderer: 'handlebars',
		rendererOpts: {
			whenPlain: {
				template: '<h1>{{Division}} {{Carline}}</h1><ul><li>City: {{[City FE (Guide) - Conventional Fuel]}} MPG</li><li>Highway: {{[Hwy FE (Guide) - Conventional Fuel]}} MPG</li></ul>'
			},
			whenGroup: {
				template: '<h1>{{rowval 0}}</h1>'
			}
		},
		source: source
	}, {
		title: '2019 Fuel Economy',
		showControls: true
	});

	jQuery('#feature_header').on('click', function () {
		jQuery('#feature_list').toggle();
	});
});
		</script>
		<style>
#feature_header {
	font-size: 1em;
	cursor: pointer;
}
		</style>
	</head>
	<body>
		<h1 id="feature_header">What features are in this example? (click to see)</h1>
		<ul id="feature_list" style="display: none">
			<li>Dates and Currency</li>
			<li>Filter, Group, Pivot, Sort</li>
			<li>Saved Views</li>
		</ul>
		<div id="grid"></div>
	</body>
</html>
