<html>
	<head>
		<meta charset="utf-8"/>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.8.3/underscore-min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/numeral.js/2.0.4/numeral.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.17.1/moment.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/chosen/1.6.2/chosen.jquery.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/2.4.4/flatpickr.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/progressbar.js/1.0.1/progressbar.js"></script>
		<script src="tabletool.js"></script>
		<script src="wcdatavis.js"></script>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" type="text/css"/>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chosen/1.6.2/chosen.css" type="text/css"/>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/2.4.4/flatpickr.css" type="text/css"/>
		<link rel="stylesheet" href="tabletool.css" type="text/css"/>
		<link rel="stylesheet" href="wcdatavis.css" type="text/css"/>
		<script>
$(document).ready(function () {
	MIE.DEBUGGING = true;

	var bbcode = function (cell, field, typeInfo, row) {
		var m = cell.value.match(/\[url=([^\]]+)\]([^\[]+)\[\/url\]/);
		if (m !== null) {
			cell.render = function (value) {
				return jQuery('<a>', { href: m[1] }).text(value);
			};
			cell.orig = cell.value;
			cell.value = m[2];
			return true;
		}
		return false;
	};

	var dataSource = new MIE.DataSource({
		type: 'http',
		url: 'data.xml',
		conversion: [bbcode]
	});
	var tagOpts = {
		runImmediately: true,
		title: 'Basic Example'
	};
	var defn = {
		id: 'example',
		table: {
			features: {
				sort: true,
				filter: true,
				group: true,
				pivot: true
			},
			columns: [
				{ field: "first_name", displayText: "First Name" },
				{ field: "last_name", displayText: "Last Name" },
				{ field: "random_date", displayText: "Random Date", format: "MM/DD/YYYY" },
				{ field: "random_int", displayText: "Random Int" },
				{ field: "random_float", displayText: "Random Float" },
				{ field: "random_money", displayText: "Random Money" },
				{ field: "date_link", displayText: "Date Link", format: "MMM Do, YYYY" }
			]
		},
		source: dataSource
	};
	new MIE.WCGrid('example', defn, tagOpts);
});
		</script>
	</head>
	<body>
		<div id="example"></div>
	</body>
</html>
