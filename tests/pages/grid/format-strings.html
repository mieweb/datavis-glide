<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<style>
			span.pink-box {
				border: solid 2px #e91e63;
				padding: 2px;
			}
			span.highlight {
				background-color: #ffeb3b;
			}
		</style>
		<script type="module" src="/index.js"></script>
		<link rel="stylesheet" href="../base.css"/>
		<script type="module">
import { Source, ComputedView, Grid } from '/index.js';
document.addEventListener('DOMContentLoaded', function () {
	window.MIE = window.MIE || {};
	window.MIE.DEBUGGING = true;

	var source = new Source({
		type: 'http',
		url: 'format-strings.csv'
	});
	var view = new ComputedView(source);
	new Grid({
		id: 'grid',
		computedView: view,
		table: {
			features: {
				limit: false,
				rowSelect: true,
			},
			columns: [{
				field: 'test',
				allowFormatting: true
			}]
		}
	}, {
		title: 'Test - Grid - Formatting Strings',
		showControls: true
	});
});
		</script>
	</head>
	<body>
		<div id="grid"></div>
	</body>
</html>
