$(document).ready(function () {
	MIE.DEBUGGING = true;

	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: '../../random10000.json'
	});
	var view = new MIE.WC_DataVis.ComputedView(source);
	new MIE.WC_DataVis.Grid({
		id: 'grid',
		source: source,
		computedView: view
	}, {
		title: 'Test / Grid / Basic / Random 10000',
		showControls: true
	});
});
