<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script src="../wcdatavis.js"></script>
		<link rel="stylesheet" href="../base.css"/>
		<link rel="stylesheet" href="../wcdatavis.css"/>
		<script>
document.addEventListener('DOMContentLoaded', function () {
	MIE.DEBUGGING = true;

	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: '../fruit.csv'
	}, null, {
		'Date': {
			type: 'date',
			format: 'M/D/YYYY'
		}
	});
	var view = new MIE.WC_DataVis.ComputedView(source);
	new MIE.WC_DataVis.Grid({
		id: 'grid',
		computedView: view,
		table: {
			features: {
				rowSelect: true,
				floatingHeader: true,
				limit: true,
				footer: true
			},
			floatingHeader: {
				method: 'tabletool'
			},
			limit: {
				threshold: 50,
			},
			footer: {
				'Category': {
					fun: 'valuesWithCounts',
					fields: ['Category'],
					format: '%s'
				},
				'Amount': {
					fun: 'sum',
					fields: ['Amount'],
					format: 'Sum = %s'
				}
			}
		},
		source: source
	}, {
		title: 'Fruit Sales',
		showControls: true
	});
});
		</script>
	</head>
	<body>
		<div id="grid"></div>
	</body>
</html>
