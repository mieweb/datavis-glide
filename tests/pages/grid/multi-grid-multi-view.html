<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script type="module" src="/index.js"></script>
		<link rel="stylesheet" href="../font-awesome.css"/>
		<link rel="stylesheet" href="../base.css"/>
		<script type="module">
import { Source, ComputedView, Grid, Prefs } from '/index.js';
document.addEventListener('DOMContentLoaded', function () {
	var agg = [{
		fun: 'count'
	}, {
		fun: 'sum',
		fields: ['Amount']
	}];

	var source = new Source({
		type: 'http',
		url: '../fruit.csv'
	}, null, {
		'Date': {
			type: 'date',
			format: 'M/D/YYYY'
		}
	});

	var prefs1 = new Prefs('TEST:GRID:MULTI-GRID-MULTI-VIEW1', null, {
		backend: {
			type: 'temporary'
		}
	});
	prefs1.addPerspective(null, 'Primary', {
		view: {
			group: {
				fieldNames: ['Category']
			},
			pivot: {
				fieldNames: ['Product']
			},
			aggregate: {
				group: agg,
				pivot: agg,
				cell: agg,
				all: agg
			}
		}
	});
	var view1 = new ComputedView(source, {
		prefs: prefs1
	});
	new Grid({
		id: 'multi-grid-1',
		computedView: view1,
		prefs: prefs1,
		table: {
			features: {
				limit: false,
				rowSelect: true,
			},
		}
	}, {
		title: 'Test - Grid - Multi №1',
		showControls: true
	});

	var prefs2 = new Prefs('TEST:GRID:MULTI-GRID-MULTI-VIEW2', null, {
		backend: {
			type: 'temporary'
		}
	});
	prefs2.addPerspective(null, 'Primary', {
		view: {
			group: {
				fieldNames: ['Product']
			},
			aggregate: {
				group: agg,
				pivot: agg,
				cell: agg,
				all: agg
			}
		}
	});
	var view2 = new ComputedView(source, {
		prefs: prefs2
	});
	new Grid({
		id: 'multi-grid-2',
		computedView: view2,
		prefs: prefs2,
		table: {
			features: {
				limit: false,
				rowSelect: true,
			},
		}
	}, {
		title: 'Test - Grid - Multi №2',
		showControls: true
	});
});
		</script>
	</head>
	<body>
		<div id="multi-grid-1"></div>
		<div id="multi-grid-2"></div>
	</body>
</html>
