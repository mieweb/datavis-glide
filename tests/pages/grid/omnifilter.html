<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script type="module" src="/index.js"></script>
		<link rel="stylesheet" href="../font-awesome.css"/>
		<link rel="stylesheet" href="../base.css"/>
		<script type="module">
import { Source, ComputedView, Grid } from '/index.js';
document.addEventListener('DOMContentLoaded', function () {
	window.MIE = window.MIE || {};
	window.MIE.DEBUGGING = true;

	var source = new Source({
		type: 'http',
		url: '../random1000.json'
	});
	var view = new ComputedView(source);
	new Grid({
		id: 'grid',
		computedView: view,
		table: {
			features: {
				limit: false,
				omnifilter: true,
			},
			columns: [
					'rowId'
				, 'string1'
				, 'country'
				, 'state'
				, 'fruit'
				, 'int1'
				, 'float1'
			]
		}
	}, {
		title: 'Test - Grid - Omnifilter',
		showControls: true
	});
});
		</script>
	</head>
	<body>
		<div id="grid"></div>
	</body>
</html>
