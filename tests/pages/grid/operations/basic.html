<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script src="../../jquery.min.js"></script>
		<script src="../../jquery-ui.min.js"></script>
		<script src="../../jquery.blockUI.js"></script>
		<script src="../../jquery.contextMenu.min.js"></script>
		<script src="../../jquery.sumoselect.min.js"></script>
		<script src="../../flatpickr.min.js"></script>
		<script src="../../wcdatavis.js"></script>
		<link rel="stylesheet" href="../../font-awesome.css"/>
		<link rel="stylesheet" href="../../jquery-ui.min.css"/>
		<link rel="stylesheet" href="../../jquery.contextMenu.min.css"/>
		<link rel="stylesheet" href="../../sumoselect.min.css"/>
		<link rel="stylesheet" href="../../flatpickr.min.css"/>
		<link rel="stylesheet" href="../../base.css"/>
		<link rel="stylesheet" href="../../wcdatavis.css"/>
		<script>
$(document).ready(function () {
	MIE.DEBUGGING = true;

	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: '../../random100.json'
	});
	var computedView = new MIE.WC_DataVis.ComputedView(source);
	new MIE.WC_DataVis.Grid({
		id: 'grid',
		computedView: computedView,
		table: {
			features: {
				limit: false,
				rowSelect: true,
				operations: true,
			}
		},
		operations: {
			row: [{
				icon: 'fa-search',
				tooltip: 'Inspect',
				callback: function (row) {
					console.info('Performing "inspect" operation on row: %O', row);
				}
			}, {
				icon: 'fa-trash',
				tooltip: 'Delete',
				callback: function (row) {
					console.info('Performing "delete" operation on row: %O', row);
				}
			}],
			cell: {
				'string1': [{
					icon: 'fa-heart',
					tooltip: 'Like',
					callback: function (info) {
						console.info('Performing "like" operation on row: %O', info.row);
						info.cellElt.attr('data-liked', +!+info.cellElt.attr('data-liked'));
						info.opBtn.css('color', !!+info.cellElt.attr('data-liked') ? 'red' : '')
					}
				}, {
					icon: 'fa-book',
					tooltip: 'Look Up',
					callback: function (info) {
						window.open('https://www.thefreedictionary.com/' + encodeURI(info.cell), '_blank');
					}
				}]
			},
			all: [{
				icon: 'fa-flask',
				label: 'Take Ye Flask',
				callback: function (info) {
					alert(info.rows.length + ' rows selected');
				}
			}, {
				icon: 'fa-battery-0',
				category: 'Power'
			}, {
				icon: 'fa-battery-1',
				category: 'Power'
			}, {
				icon: 'fa-battery-2',
				category: 'Power'
			}, {
				icon: 'fa-battery-3',
				category: 'Power'
			}, {
				icon: 'fa-battery-4',
				category: 'Power'
			}, {
				icon: 'fa-thumbs-o-up',
				category: 'Rating',
				callback: function (sel) {
					alert('good');
				}
			}, {
				icon: 'fa-thumbs-o-down',
				category: 'Rating',
				callback: function (sel) {
					alert('bad');
				}
			}]
		},
		source: source,
	}, {
		title: 'Test - Grid - Operations - Basic',
		showControls: true
	});
});
		</script>
	</head>
	<body>
		<div id="grid"></div>
	</body>
</html>
