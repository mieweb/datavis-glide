<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script type="module" src="/index.js"></script>
		<link rel="stylesheet" href="../../font-awesome.css"/>
		<link rel="stylesheet" href="../../base.css"/>
		<link rel="stylesheet" href="../../wcdatavis.css"/>
		<script type="module">
import { Source, ComputedView, Grid } from '/index.js';
document.addEventListener('DOMContentLoaded', function () {
	window.MIE = window.MIE || {};
	window.MIE.DEBUGGING = true;

	var source = new Source({
		type: 'http',
		url: '../../random100.json'
	});
	var view = new ComputedView(source);
	var grid = new Grid({
		id: 'grid',
		computedView: view,
		table: {
			features: {
				limit: false,
				rowSelect: true,
				operations: true,
			}
		},
		source: source,
	}, {
		title: 'Test - Grid - Operations - Delayed',
		showControls: true
	});
	window.setTimeout(function () {
		grid.setOperations({
			row: [{
				icon: 'fa-search',
				tooltip: 'Inspect',
				callback: function (row) {
					console.info('Performing "inspect" operation on row: %O', row);
				}
			}, {
				icon: 'fa-trash',
				tooltip: 'Delete',
				callback: function (row) {
					console.info('Performing "delete" operation on row: %O', row);
				}
			}],
			cell: {
				'string1': [{
					icon: 'fa-heart',
					tooltip: 'Like',
					callback: function (info) {
						console.info('Performing "like" operation on row: %O', info.row);
						info.cellElt.attr('data-liked', +!+info.cellElt.attr('data-liked'));
						info.opBtn.css('color', !!+info.cellElt.attr('data-liked') ? 'red' : '')
					}
				}, {
					icon: 'fa-book',
					tooltip: 'Look Up',
					callback: function (info) {
						window.open('https://www.thefreedictionary.com/' + encodeURI(info.cell), '_blank');
					}
				}]
			},
			all: [{
				icon: 'fa-flask',
				label: 'Take Ye Flask',
				callback: function (info) {
					alert(info.rows.length + ' rows selected');
				}
			}, {
				icon: 'fa-battery-0',
				category: 'Power'
			}, {
				icon: 'fa-battery-1',
				category: 'Power'
			}, {
				icon: 'fa-battery-2',
				category: 'Power'
			}, {
				icon: 'fa-battery-3',
				category: 'Power'
			}, {
				icon: 'fa-battery-4',
				category: 'Power'
			}, {
				icon: 'fa-thumbs-o-up',
				category: 'Rating',
				callback: function (sel) {
					alert('good');
				}
			}, {
				icon: 'fa-thumbs-o-down',
				category: 'Rating',
				callback: function (sel) {
					alert('bad');
				}
			}]
		});
	}, 3000);
});
		</script>
	</head>
	<body>
		<div id="grid"></div>
	</body>
</html>
