<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script src="../../jquery-latest.js"></script>
		<script src="../../jquery-ui.js"></script>
		<script src="../../blockUI.js"></script>
		<script src="../../contextMenu.js"></script>
		<script src="../../sumoselect.js"></script>
		<script src="../../flatpickr.js"></script>
		<script src="../../wcdatavis.js"></script>
		<link rel="stylesheet" href="../../font-awesome.css"/>
		<link rel="stylesheet" href="../../jquery-ui.css"/>
		<link rel="stylesheet" href="../../contextMenu.css"/>
		<link rel="stylesheet" href="../../sumoselect.css"/>
		<link rel="stylesheet" href="../../flatpickr.css"/>
		<link rel="stylesheet" href="../../base.css"/>
		<link rel="stylesheet" href="../../wcdatavis.css"/>
		<script>
$(document).ready(function () {
	MIE.DEBUGGING = true;

	var prefs = new MIE.WC_DataVis.Prefs('TEST:GRID:COLCONFIG:PREFS', null, {
		backend: {
			type: 'localStorage'
		}
	});
	prefs.addPerspective(null, 'C,B', {
		grid: {
			colConfig: {
				_keys: ['C', 'B'],
				_map: {
					B: {field: 'B'},
					C: {field: 'C'}
				}
			}
		}
	});
	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: 'data/none.csv'
	});
	var view = new MIE.WC_DataVis.View(source, 'View', {
		prefs: prefs
	});
	new MIE.WC_DataVis.Grid('grid', view, {
		id: 'grid',
		prefs: prefs,
		table: {
			features: {
				limit: false,
			}
		},
		source: source,
	}, {
		title: 'Test - Grid - ColConfig - Normal, Prefs',
		showControls: true
	});
});
		</script>
	</head>
	<body>
		<div id="grid"></div>
	</body>
</html>
