<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script src="../wcdatavis.js"></script>
		<link rel="stylesheet" href="../base.css"/>
		<!-- The browser doesn't even try to fetch the web fonts if this only goes inside the shadow root. -->
		<!-- <link rel="stylesheet" href="../wcdatavis.css"/> -->
		<script>
document.addEventListener('DOMContentLoaded', function () {
	MIE.DEBUGGING = true;

	// Create a host element
	// const host = document.createElement('div');
	// Attach the shadow root
	const host = document.getElementById('datavis-container-host');
	const shadowRoot = host.attachShadow({mode: 'open'});
	shadowRoot.innerHTML = `
		<style>
			@import url("../wcdatavis.css");
@font-face {
  font-family: 'FontAwesome';
  src: url('fontawesome-webfont.eot?v=4.7.0');
  src: url('fontawesome-webfont.eot?#iefix&v=4.7.0') format('embedded-opentype'), url('fontawesome-webfont.woff2?v=4.7.0') format('woff2'), url('fontawesome-webfont.woff?v=4.7.0') format('woff'), url('fontawesome-webfont.ttf?v=4.7.0') format('truetype'), url('fontawesome-webfont.svg?v=4.7.0#fontawesomeregular') format('svg');
  font-weight: normal;
  font-style: normal;
}
		</style>
		<div id="datavis-container"></div>
	`;

	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: '../random100.json'
	});
	const view = new MIE.WC_DataVis.ComputedView(source);

	// window.Source = Source;
	// window.ComputedView = ComputedView;
	// window.Grid = Grid;
	window.view = view;
	window.source = source;
	window.__shadowRoot = shadowRoot;
	const script = document.createElement('script');
	script.textContent = `
		(function() {
			const shadowRoot = window.__shadowRoot;

			// Override getElementById to search in shadowRoot first
			const originalGetElementById = document.getElementById;
			document.getElementById = function(id) {
				return shadowRoot.getElementById(id) || originalGetElementById.call(document, id);
			};
			new MIE.WC_DataVis.Grid({
				id: 'datavis-container',
				computedView: window.view,
				source: window.source,
			}, {
				title: 'Test // Grid // Shadow Root',
			});
			document.getElementById = originalGetElementById;
		})();
	`;
	shadowRoot.appendChild(script);
});
		</script>
	</head>
	<body>
		<div id="datavis-container-host"></div>
	</body>
</html>
