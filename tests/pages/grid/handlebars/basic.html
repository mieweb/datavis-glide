<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script src="../../jquery.min.js"></script>
		<script src="../../jquery-ui.min.js"></script>
		<script src="../../jquery.blockUI.js"></script>
		<script src="../../jquery.contextMenu.min.js"></script>
		<script src="../../jquery.sumoselect.min.js"></script>
		<script src="../../flatpickr.min.js"></script>
		<script src="../../wcdatavis.js"></script>
		<link rel="stylesheet" href="../../font-awesome.css"/>
		<link rel="stylesheet" href="../../jquery-ui.min.css"/>
		<link rel="stylesheet" href="../../jquery.contextMenu.min.css"/>
		<link rel="stylesheet" href="../../sumoselect.min.css"/>
		<link rel="stylesheet" href="../../flatpickr.min.css"/>
		<link rel="stylesheet" href="../../base.css"/>
		<link rel="stylesheet" href="../../wcdatavis.css"/>
		<script>
$(document).ready(function () {
	MIE.DEBUGGING = true;

	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: '../../fuel-economy.csv'
	});
	var computedView = new MIE.WC_DataVis.ComputedView(source);
	new MIE.WC_DataVis.Grid({
		id: 'grid',
		computedView: computedView,
		renderer: 'handlebars',
		rendererOpts: {
			whenPlain: {
				before: '<h1>Fuel Economy</h1>',
				item: '<h2>{{Division}} {{Carline}}</h2><ul><li>City: {{[City FE (Guide) - Conventional Fuel]}} MPG</li><li>Highway: {{[Hwy FE (Guide) - Conventional Fuel]}} MPG</li></ul>',
				after: '<h1>That\'s All Folks!</h1>'
			},
			whenGroup: {
				item: '<h1>{{rowval 0}}</h1>'
			},
			whenPivot: {
				before: '<ul>',
				item: '<li>{{rowval 0}} - {{colval 0}}</li>',
				after: '</ul>'
			}
		},
		source: source
	}, {
		title: 'Test - Grid - Handlebars - Basic',
		showControls: true
	});
});
		</script>
	</head>
	<body>
		<div id="grid"></div>
	</body>
</html>
