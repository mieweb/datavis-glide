<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script src="../../jquery.min.js"></script>
		<script src="../../jquery-ui.min.js"></script>
		<script src="../../jquery.blockUI.js"></script>
		<script src="../../jquery.contextMenu.min.js"></script>
		<script src="../../jquery.sumoselect.min.js"></script>
		<script src="../../flatpickr.min.js"></script>
		<script src="../../wcdatavis.js"></script>
		<link rel="stylesheet" href="../../font-awesome.css"/>
		<link rel="stylesheet" href="../../jquery-ui.min.css"/>
		<link rel="stylesheet" href="../../jquery.contextMenu.min.css"/>
		<link rel="stylesheet" href="../../sumoselect.min.css"/>
		<link rel="stylesheet" href="../../flatpickr.min.css"/>
		<link rel="stylesheet" href="../../base.css"/>
		<link rel="stylesheet" href="../../wcdatavis.css"/>
		<script>
$(document).ready(function () {
	MIE.DEBUGGING = true;

	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: '/reflect/cgi'
	}, [
		new MIE.WC_DataVis.ParamInput('report', {
			inputType: 'form',
			reportMethod: 'cgi',
			cgi: {}
		})
	]);
	var computedView = new MIE.WC_DataVis.ComputedView(source);
	new MIE.WC_DataVis.Grid({
		id: 'grid',
		computedView: computedView,
		table: {
			features: {
				limit: false
			}
		},
		source: source,
	}, {
		title: 'Test - Grid - Form',
		showControls: true
	});
});
		</script>
	</head>
	<body>
		<form id="form">
			<input type="hidden" name="hidden" value="hidden"/>
			<input type="text" name="text" value="test"/><hr/>
			<input id="checkbox1" type="checkbox" name="checkbox" value="ham"><label for="checkbox1">Ham</label>
			<input id="checkbox2" type="checkbox" name="checkbox" value="pepperoni" checked><label for="checkbox2">Pepperoni</label>
			<input id="checkbox3" type="checkbox" name="checkbox" value="mushrooms" checked><label for="checkbox3">Mushrooms</label>
			<input id="checkbox4" type="checkbox" name="checkbox" value="pineapple"><label for="checkbox4">Pineapple</label><hr/>
			<input id="toggle-checkbox" type="checkbox" name="toggle-checkbox" value="toggle_checkbox"><label for="toggle-checkbox">Toggle Checkbox</label><hr/>
			<input id="radio1" type="radio" name="radio" value="thin"><label for="radio1">Thin Crust</label>
			<input id="radio2" type="radio" name="radio" value="hand-tossed"><label for="radio2">Hand-Tossed</label>
			<input id="radio3" type="radio" name="radio" value="pan"><label for="radio3">Pan</label><hr/>
			<select name="select">
				<option value="black">Black</option>
				<option value="blue">Blue</option>
				<option value="red">Red</option>
			</select><hr/>
			<textarea name="textarea">
				hello frendo
			</textarea>
		</form>
		<div id="grid"></div>
	</body>
</html>
