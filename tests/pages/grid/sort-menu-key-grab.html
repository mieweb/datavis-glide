<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script src="../jquery.min.js"></script>
		<script src="../jquery-ui.min.js"></script>
		<script src="../jquery.blockUI.js"></script>
		<script src="../jquery.contextMenu.min.js"></script>
		<script src="../jquery.sumoselect.min.js"></script>
		<script src="../flatpickr.min.js"></script>
		<script src="../wcdatavis.js"></script>
		<link rel="stylesheet" href="../font-awesome.css"/>
		<link rel="stylesheet" href="../jquery-ui.min.css"/>
		<link rel="stylesheet" href="../jquery.contextMenu.min.css"/>
		<link rel="stylesheet" href="../sumoselect.min.css"/>
		<link rel="stylesheet" href="../flatpickr.min.css"/>
		<link rel="stylesheet" href="../base.css"/>
		<link rel="stylesheet" href="../wcdatavis.css"/>
		<script>
$(document).ready(function () {
	MIE.DEBUGGING = true;

	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: '../random100.json'
	});
	var view = new MIE.WC_DataVis.ComputedView(source);
	new MIE.WC_DataVis.Grid({
		id: 'grid',
		computedView: view,
		table: {
			features: {
				limit: false,
				rowSelect: true,
			}
		}
	}, {
		title: 'Test - Grid - Default',
		showControls: true
	});
});
		</script>
	</head>
	<body>
		<p>The point of this page is to test a bug where opening the sort menu once causes the
		arrow, space, and enter keys to be captured. Opening and closing the sort menu again fixes
		the issue.</p>
		<textarea rows="6" cols="100">User party stealth leverage tail product curve development rockstar stock, long testing equity android alpha financing beta business churn, mailing design channels experience iPhone facebook agile gamification monetization, accelerator grail lean infographic deployment success angel startup.</textarea>
		<div id="grid"></div>
	</body>
</html>
