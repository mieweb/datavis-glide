<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script src="/dist/vite/wcdatavis.iife.js"></script>
		<link rel="stylesheet" href="../font-awesome.css"/>
		<link rel="stylesheet" href="../base.css"/>
		<link rel="stylesheet" href="/dist/vite/wcdatavis.css"/>
		<script>
document.addEventListener('DOMContentLoaded', function () {
	MIE.DEBUGGING = true;

	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: '../random100.json'
	});
	var view = new MIE.WC_DataVis.ComputedView(source);
	new MIE.WC_DataVis.Grid({
		id: 'grid',
		computedView: view,
		table: {
			features: {
				limit: false,
				rowSelect: true,
			},
		}
	}, {
		title: 'Test - Grid - Vite Build',
		showControls: true
	});
});
		</script>
	</head>
	<body>
		<div id="grid"></div>
	</body>
</html>
