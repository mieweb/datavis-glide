<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>

		<script src="../../jquery-ui.min.js"></script>

		<script>
$(document).ready(function () {
	MIE.DEBUGGING = true;

	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: '../../random100.json'
	});
	var computedView = new MIE.WC_DataVis.ComputedView(source);
	new MIE.WC_DataVis.Grid({
		id: 'grid',
		computedView: computedView,
		table: {
			features: {
				limit: false,
				rowSelect: true,
			}
		}
	}, {
		title: 'Test - Grid - Translation',
		showControls: true
	});
});
		</script>
	</head>
	<body>
		<div id="grid"></div>
	</body>
