<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script src="../../../wcdatavis.js"></script>
		<link rel="stylesheet" href="../../../font-awesome.css"/>
		<link rel="stylesheet" href="../../../base.css"/>
		<link rel="stylesheet" href="../../../wcdatavis.css"/>
		<script>
document.addEventListener('DOMContentLoaded', function () {
	MIE.DEBUGGING = true;

	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: '../../../no-data.json'
	});

	var computedView = new MIE.WC_DataVis.ComputedView(source);
	new MIE.WC_DataVis.Grid({
		id: 'grid',
		computedView: computedView,
		renderer: 'handlebars',
		rendererOpts: {
			whenPlain: {
				empty: '<h1>No Data</h1>'
			}
		},
		source: source
	}, {
		title: 'Test - Grid - Handlebars - No Data'
	});
});
		</script>
	</head>
	<body>
		<div id="grid"></div>
	</body>
</html>
