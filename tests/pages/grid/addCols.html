<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script src="../wcdatavis.js"></script>
		<link rel="stylesheet" href="../base.css"/>
		<link rel="stylesheet" href="../wcdatavis.css"/>
		<script>
document.addEventListener('DOMContentLoaded', function () {
	MIE.DEBUGGING = true;

	function randElt(l) {
		return l[Math.floor(Math.random() * l.length)];
	}

	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: '../basic.json'
	});
	var view = new MIE.WC_DataVis.ComputedView(source);
	new MIE.WC_DataVis.Grid({
		id: 'grid',
		computedView: view,
		table: {
			features: {
				limit: false,
				rowSelect: true,
			},
			whenPlain: {
				addCols: [{
					name: 'Kaiju Link',
					value: function () {
						var kaiju = randElt(['Godzilla', 'Mothra', 'Ghidorah', 'Anguirius', 'Rodan', 'Gigan']);
						var elt = document.createElement('a');
						elt.setAttribute('href', 'https://wikizilla.org/wiki/' + kaiju);
						elt.innerText = kaiju;
						return elt;
					}
				}, {
					name: 'Shouting Fruit',
					value: function (rowData, rowNum) {
						return rowData['fruit'].value.toUpperCase();
					}
				}]
			},
			whenGroup: {
				addCols: [{
					name: 'Kaiju Link',
					value: function () {
						var kaiju = randElt(['Godzilla', 'Mothra', 'Ghidorah', 'Anguirius', 'Rodan', 'Gigan']);
						var elt = document.createElement('a');
						elt.setAttribute('href', 'https://wikizilla.org/wiki/' + kaiju);
						elt.innerText = kaiju;
						return elt;
					}
				}]
			},
			whenPivot: {
				addCols: [{
					name: 'Kaiju Link',
					value: function () {
						var kaiju = randElt(['Godzilla', 'Mothra', 'Ghidorah', 'Anguirius', 'Rodan', 'Gigan']);
						var elt = document.createElement('a');
						elt.setAttribute('href', 'https://wikizilla.org/wiki/' + kaiju);
						elt.innerText = kaiju;
						return elt;
					}
				}]
			}
		},
		source: source,
	}, {
		title: 'Test - Grid - Add Cols',
		showControls: true
	});
});
		</script>
	</head>
	<body>
		<div id="grid"></div>
	</body>
</html>
