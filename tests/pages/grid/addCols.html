<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script src="../jquery.min.js"></script>
		<script src="../jquery-ui.min.js"></script>
		<script src="../jquery.blockUI.js"></script>
		<script src="../jquery.contextMenu.min.js"></script>
		<script src="../jquery.sumoselect.min.js"></script>
		<script src="../flatpickr.min.js"></script>
		<script src="../wcdatavis.js"></script>
		<link rel="stylesheet" href="../font-awesome.css"/>
		<link rel="stylesheet" href="../jquery-ui.min.css"/>
		<link rel="stylesheet" href="../jquery.contextMenu.min.css"/>
		<link rel="stylesheet" href="../sumoselect.min.css"/>
		<link rel="stylesheet" href="../flatpickr.min.css"/>
		<link rel="stylesheet" href="../base.css"/>
		<link rel="stylesheet" href="../wcdatavis.css"/>
		<script>
$(document).ready(function () {
	MIE.DEBUGGING = true;

	function randElt(l) {
		return l[Math.floor(Math.random() * l.length)];
	}

	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: '../random100.json'
	});
	var view = new MIE.WC_DataVis.View(source, 'TEST:GRID:DEFAULT');
	new MIE.WC_DataVis.Grid('grid', view, {
		id: 'grid',
		table: {
			features: {
				limit: false,
				rowSelect: true,
			},
			whenPlain: {
				addCols: [{
					name: 'Kaiju Link',
					value: function () {
						var kaiju = randElt(['Godzilla', 'Mothra', 'Ghidorah', 'Anguirius', 'Rodan', 'Gigan']);
						return jQuery('<a>', {
							href: 'https://wikizilla.org/wiki/' + kaiju
						}).text(kaiju);
					}
				}, {
					name: 'Shouting Fruit',
					value: function (rowData, rowNum) {
						return rowData['fruit'].value.toUpperCase();
					}
				}]
			},
			whenGroup: {
				addCols: [{
					name: 'Kaiju Link',
					value: function () {
						var kaiju = randElt(['Godzilla', 'Mothra', 'Ghidorah', 'Anguirius', 'Rodan', 'Gigan']);
						return jQuery('<a>', {
							href: 'https://wikizilla.org/wiki/' + kaiju
						}).text(kaiju);
					}
				}]
			},
			whenPivot: {
				addCols: [{
					name: 'Kaiju Link',
					value: function () {
						var kaiju = randElt(['Godzilla', 'Mothra', 'Ghidorah', 'Anguirius', 'Rodan', 'Gigan']);
						return jQuery('<a>', {
							href: 'https://wikizilla.org/wiki/' + kaiju
						}).text(kaiju);
					}
				}]
			}
		},
		source: source,
	}, {
		title: 'Test - Grid - Add Cols',
		showControls: true
	});
});
		</script>
	</head>
	<body>
		<div id="grid"></div>
	</body>
</html>
