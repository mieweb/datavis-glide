<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script src="../wcdatavis.js"></script>
		<link rel="stylesheet" href="../font-awesome.css"/>
		<link rel="stylesheet" href="../base.css"/>
		<link rel="stylesheet" href="../wcdatavis.css"/>
		<script>
document.addEventListener('DOMContentLoaded', function () {
	MIE.DEBUGGING = true;

	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: '../random10000.json'
	});
	var view = new MIE.WC_DataVis.ComputedView(source);
	new MIE.WC_DataVis.Grid({
		id: 'grid',
		computedView: view,
		table: {
			features: {
				incremental: true
			}
		},
		source: source
	}, {
		title: 'Incremental'
	});
});
		</script>
	</head>
	<body>
		<div id="grid"></div>
	</body>
</html>
