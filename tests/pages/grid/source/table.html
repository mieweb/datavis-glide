<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.8.3/underscore-min.js"></script>
		<script type="module" src="/index.js"></script>
		<link rel="stylesheet" href="../../base.css"/>
		<script type="module">
import { Source, ComputedView, Grid, jQuery } from '/index.js';
document.addEventListener('DOMContentLoaded', function () {
	jQuery.ajax('../../../data/random100.json', {
		success: function (data, status, xhr) {
			var tbl = jQuery('<table>');
			var thead = jQuery('<thead>').appendTo(tbl);
			var tbody = jQuery('<tbody>').appendTo(tbl);
			var tr = jQuery('<tr>').appendTo(thead);
			_.each(data.typeInfo, function (fti) {
				jQuery('<th>').text(fti.field).appendTo(tr);
			});
			_.each(data.data, function (row) {
				tr = jQuery('<tr>').appendTo(tbody);
				_.each(data.typeInfo, function (fti) {
					jQuery('<td>').text(row[fti.field]).appendTo(tr);
				});
			});
			jQuery('#table').append(tbl);
		}
	});
	jQuery('#convert').on('click', function () {
		jQuery(this).hide();
		var source = new Source({
			type: 'table',
			tableSelector: '#table',
			columnSelector: '#table table thead tr th',
			dataSelector: '#table table tbody tr td'
		});
		var view = new ComputedView(source);
		new Grid({
			id: 'grid',
			computedView: view,
			source: source,
		}, {
			title: 'Test // Source // Table',
			showControls: true
		});
	});
});
		</script>
	</head>
	<body>
		<div id="grid"></div>
		<button id="convert" type="button">Convert to DataVis</button>
		<div id="table"></div>
	</body>
</html>
