<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.8.3/underscore-min.js"></script>
		<script src="../../jquery-latest.js"></script>
		<script src="../../jquery-ui.js"></script>
		<script src="../../blockUI.js"></script>
		<script src="../../contextMenu.js"></script>
		<script src="../../sumoselect.js"></script>
		<script src="../../flatpickr.js"></script>
		<script src="../../wcdatavis.js"></script>
		<link rel="stylesheet" href="../../font-awesome.css"/>
		<link rel="stylesheet" href="../../jquery-ui.css"/>
		<link rel="stylesheet" href="../../contextMenu.css"/>
		<link rel="stylesheet" href="../../sumoselect.css"/>
		<link rel="stylesheet" href="../../flatpickr.css"/>
		<link rel="stylesheet" href="../../base.css"/>
		<link rel="stylesheet" href="../../wcdatavis.css"/>
		<script>
$(document).ready(function () {
	MIE.DEBUGGING = true;

	jQuery.ajax('../../../data/random100.json', {
		success: function (data, status, xhr) {
			var tbl = jQuery('<table>');
			var thead = jQuery('<thead>').appendTo(tbl);
			var tbody = jQuery('<tbody>').appendTo(tbl);
			var tr = jQuery('<tr>').appendTo(thead);
			_.each(data.typeInfo, function (fti) {
				jQuery('<th>').text(fti.field).appendTo(tr);
			});
			_.each(data.data, function (row) {
				tr = jQuery('<tr>').appendTo(tbody);
				_.each(data.typeInfo, function (fti) {
					jQuery('<td>').text(row[fti.field]).appendTo(tr);
				});
			});
			jQuery('#table').append(tbl);
		}
	});
});

function start(btn) {
	jQuery(btn).hide();
	var source = new MIE.WC_DataVis.Source({
		type: 'table',
		tableSelector: '#table',
		columnSelector: '#table table thead tr th',
		dataSelector: '#table table tbody tr td'
	});
	var view = new MIE.WC_DataVis.ComputedView(source);
	new MIE.WC_DataVis.Grid({
		id: 'grid',
		computedView: view,
		source: source,
	}, {
		title: 'Test - Grid - Source - Table',
		showControls: true
	});
}
		</script>
	</head>
	<body>
		<div id="grid"></div>
		<button type="button" onclick="start(this)">Convert to DataVis</button>
		<div id="table"></div>
	</body>
</html>
