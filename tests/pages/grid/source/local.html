<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.8.3/underscore-min.js"></script>
		<script type="module" src="/index.js"></script>
		<link rel="stylesheet" href="../../base.css"/>
		<script type="module">
import { Source, ComputedView, Grid, Util } from '/index.js';
document.addEventListener('DOMContentLoaded', function () {
	var data = new Util.EagerPipeline(function () {
		var n = (Math.random() * 9999).toFixed(5);
		return [+n, -1 * n];
	}).andThenCurry(_.times, 10)
		.andThen(_.flatten)
		.andThen(_.sortBy)
		.andThenCurry(_.map, '#', function (x) {
			return {
				'dummy': 'dummy',
				'number-primitive-0': x,
				'number-primitive-1': x,
				'number-primitive-2': x,
				'number-primitive-3': x,
				'number-primitive-4': x,
				'number-primitive-5': x,
				'number-primitive-6': x,
				'number-numeral-0': x,
				'number-numeral-1': x,
				'number-numeral-2': x,
				'number-numeral-3': x,
				'number-numeral-4': x,
				'number-numeral-5': x,
				'number-numeral-6': x,
				'number-bignumber-0': x,
				'number-bignumber-1': x,
				'number-bignumber-2': x,
				'number-bignumber-3': x,
				'number-bignumber-4': x,
				'number-bignumber-5': x,
				'number-bignumber-6': x,
				'currency-primitive-0': x,
				'currency-primitive-1': x,
				'currency-primitive-2': x,
				'currency-primitive-3': x,
				'currency-primitive-4': x,
				'currency-primitive-5': x,
				'currency-primitive-6': x,
				'currency-numeral-0': x,
				'currency-numeral-1': x,
				'currency-numeral-2': x,
				'currency-numeral-3': x,
				'currency-numeral-4': x,
				'currency-numeral-5': x,
				'currency-numeral-6': x,
				'currency-bignumber-0': x,
				'currency-bignumber-1': x,
				'currency-bignumber-2': x,
				'currency-bignumber-3': x,
				'currency-bignumber-4': x,
				'currency-bignumber-5': x,
				'currency-bignumber-6': x,
			};
		})
		.done();

	window.localData = {
		data: data,
		typeInfo: {
			'dummy': { type: 'string' },
			'number-primitive-0': { type: 'number', internalType: 'primitive' },
			'number-primitive-1': { type: 'number', internalType: 'primitive' },
			'number-primitive-2': { type: 'number', internalType: 'primitive' },
			'number-primitive-3': { type: 'number', internalType: 'primitive' },
			'number-primitive-4': { type: 'number', internalType: 'primitive' },
			'number-primitive-5': { type: 'number', internalType: 'primitive' },
			'number-primitive-6': { type: 'number', internalType: 'primitive' },
			'number-numeral-0': { type: 'number', internalType: 'numeral' },
			'number-numeral-1': { type: 'number', internalType: 'numeral' },
			'number-numeral-2': { type: 'number', internalType: 'numeral' },
			'number-numeral-3': { type: 'number', internalType: 'numeral' },
			'number-numeral-4': { type: 'number', internalType: 'numeral' },
			'number-numeral-5': { type: 'number', internalType: 'numeral' },
			'number-numeral-6': { type: 'number', internalType: 'numeral' },
			'number-bignumber-0': { type: 'number', internalType: 'bignumber' },
			'number-bignumber-1': { type: 'number', internalType: 'bignumber' },
			'number-bignumber-2': { type: 'number', internalType: 'bignumber' },
			'number-bignumber-3': { type: 'number', internalType: 'bignumber' },
			'number-bignumber-4': { type: 'number', internalType: 'bignumber' },
			'number-bignumber-5': { type: 'number', internalType: 'bignumber' },
			'number-bignumber-6': { type: 'number', internalType: 'bignumber' },
			'currency-primitive-0': { type: 'currency', internalType: 'primitive' },
			'currency-primitive-1': { type: 'currency', internalType: 'primitive' },
			'currency-primitive-2': { type: 'currency', internalType: 'primitive' },
			'currency-primitive-3': { type: 'currency', internalType: 'primitive' },
			'currency-primitive-4': { type: 'currency', internalType: 'primitive' },
			'currency-primitive-5': { type: 'currency', internalType: 'primitive' },
			'currency-primitive-6': { type: 'currency', internalType: 'primitive' },
			'currency-numeral-0': { type: 'currency', internalType: 'numeral' },
			'currency-numeral-1': { type: 'currency', internalType: 'numeral' },
			'currency-numeral-2': { type: 'currency', internalType: 'numeral' },
			'currency-numeral-3': { type: 'currency', internalType: 'numeral' },
			'currency-numeral-4': { type: 'currency', internalType: 'numeral' },
			'currency-numeral-5': { type: 'currency', internalType: 'numeral' },
			'currency-numeral-6': { type: 'currency', internalType: 'numeral' },
			'currency-bignumber-0': { type: 'currency', internalType: 'bignumber' },
			'currency-bignumber-1': { type: 'currency', internalType: 'bignumber' },
			'currency-bignumber-2': { type: 'currency', internalType: 'bignumber' },
			'currency-bignumber-3': { type: 'currency', internalType: 'bignumber' },
			'currency-bignumber-4': { type: 'currency', internalType: 'bignumber' },
			'currency-bignumber-5': { type: 'currency', internalType: 'bignumber' },
			'currency-bignumber-6': { type: 'currency', internalType: 'bignumber' },
		}
	};

	var source = new Source({
		type: 'local',
		varName: 'localData'
	});
	var view = new ComputedView(source);
	new Grid({
		id: 'grid',
		computedView: view,
		source: source,
	}, {
		title: 'Test // Source // Local',
		showControls: true
	});
});
		</script>
	</head>
	<body>
		<div id="grid"></div>
	</body>
</html>
