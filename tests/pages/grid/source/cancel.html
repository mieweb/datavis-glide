<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script type="module" src="/index.js"></script>
		<link rel="stylesheet" href="../../font-awesome.css"/>
		<link rel="stylesheet" href="../../base.css"/>
		<script type="module">
import { Source, ComputedView, Grid } from '/index.js';
document.addEventListener('DOMContentLoaded', function () {
	const source = new Source({
		type: 'http',
		url: '/source/delayed'
	});
	const view = new ComputedView(source);
	new Grid({
		id: 'grid',
		computedView: view,
		table: {
			features: {
				limit: false
			}
		}
	}, {
		title: 'Test - Grid - Source - Cancel',
		showControls: true
	});
});
		</script>
	</head>
	<body>
		<div id="grid"></div>
	</body>
</html>
