<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script src="../wcdatavis.js"></script>
		<link rel="stylesheet" href="../font-awesome.css"/>
		<link rel="stylesheet" href="../base.css"/>
		<link rel="stylesheet" href="../wcdatavis.css"/>
		<script>
document.addEventListener('DOMContentLoaded', function () {
	MIE.DEBUGGING = true;

	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: '../fruit.csv'
	}, null, {
		'Date': {
			type: 'date',
			format: 'M/D/YYYY'
		}
	});
	var view = new MIE.WC_DataVis.ComputedView(source);
	new MIE.WC_DataVis.Grid({
		id: 'grid',
		computedView: view,
		table: {
			whenGroup: {
				displayOrder: ['groupAggregates', 'rowVals']
			},
			whenPivot: {
				displayOrder: ['groupAggregates', 'rowVals', 'cells']
			},
			features: {
				rowSelect: true,
				floatingHeader: true
			},
			floatingHeader: {
				method: 'floatThead'
			},
			columns: [{
				field: 'Order ID'
			}, {
				field: 'Product'
			}, {
				field: 'Category'
			}, {
				field: 'Amount',
				format: '$0,0.00'
			}, {
				field: 'Date'
			}, {
				field: 'Country'
			}]
		},
		source: source
	}, {
		title: 'Fruit Sales',
		showControls: true
	});
});
		</script>
	</head>
	<body>
		<div id="grid"></div>
	</body>
</html>
