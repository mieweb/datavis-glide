<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script src="../wcdatavis.js"></script>
		<link rel="stylesheet" href="../font-awesome.css"/>
		<link rel="stylesheet" href="../base.css"/>
		<link rel="stylesheet" href="../wcdatavis.css"/>
		<script>
document.addEventListener('DOMContentLoaded', function () {
	MIE.DEBUGGING = true;

	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: '../random1000.json'
	});

	var prefs = new MIE.WC_DataVis.Prefs('example_pigeon_hole_1');

	prefs.addPerspective(null, 'Pre-Configured', {
		view: {
			group: {
				fieldNames: ['fruit'],
				addRowVals: [['Lemon'], ['Lime']]
			},
			sort: {
				vertical: {
					field: 'fruit',
					values: ['Strawberry', 'Mango', 'Lemon', 'Lime', 'Blueberry', 'Grape']
				}
			}
		}
	});

	var computedView = new MIE.WC_DataVis.ComputedView(source, {
		prefs: prefs
	});

	var graph = new MIE.WC_DataVis.Graph('graph', computedView, {
		whenGroup: {
			graphType: 'pie',
			options: {
				sliceVisibilityThreshold: 0,
				colors: ['red', 'orange', 'yellow', 'green', 'blue', 'purple']
			}
		}
	}, {
		title: 'Fruit',
		height: 600
	});

	var grid = new MIE.WC_DataVis.Grid({
		id: 'grid',
		computedView: computedView,
		prefs: prefs,
		table: {
			features: {
				floatingHeader: false
			},
		},
	}, {
		title: 'Pigeon Hole',
	});
});
		</script>
	</head>
	<body>
		<div id="graph"></div>
		<div id="grid"></div>
	</body>
</html>
