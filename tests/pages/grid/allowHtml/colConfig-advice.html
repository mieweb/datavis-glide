<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script src="../../jquery.min.js"></script>
		<script src="../../jquery-ui.min.js"></script>
		<script src="../../jquery.blockUI.js"></script>
		<script src="../../jquery.contextMenu.min.js"></script>
		<script src="../../jquery.sumoselect.min.js"></script>
		<script src="../../flatpickr.min.js"></script>
		<script src="../../wcdatavis.js"></script>
		<link rel="stylesheet" href="../../jquery-ui.min.css"/>
		<link rel="stylesheet" href="../../jquery.contextMenu.min.css"/>
		<link rel="stylesheet" href="../../sumoselect.min.css"/>
		<link rel="stylesheet" href="../../flatpickr.min.css"/>
		<link rel="stylesheet" href="../../base.css"/>
		<link rel="stylesheet" href="../../wcdatavis.css"/>
		<script>
$(document).ready(function () {
	MIE.DEBUGGING = true;

	var prefs = new MIE.WC_DataVis.Prefs('TEST:GRID:ALLOWHTML:NO-PREFS', null, {
		backend: {
			type: 'temporary'
		}
	});

	prefs.addPerspective(null, 'Test', {
		grid: {
			colConfig: {
				_keys: ['link1', 'link2', 'link3', 'link4'],
				_map: {
					link1: {field: 'link1'},
					link2: {field: 'link2', allowHtml: false},
					link3: {field: 'link3'},
					link4: {field: 'link4', allowHtml: false},
				}
			}
		}
	});

	MIE.WC_DataVis.Source.converters.link3 = function (cell, field, fti, info) {
		cell.render = function (displayText) {
			var a = document.createElement('a');
			a.setAttribute('href', 'https://en.wikipedia.org/wiki/' + cell.value);
			a.innerText = displayText;
			return a;
		};
		return true; // conversion successful
	};

	MIE.WC_DataVis.Source.converters.link4 = function (cell, field, fti, info) {
		cell.render = function (displayText) {
			var a = document.createElement('a');
			a.setAttribute('href', 'https://en.wikipedia.org/wiki/' + cell.value);
			a.innerText = 'Same Text, Different Link';
			return a;
		};
		return true; // conversion successful
	};

	MIE.WC_DataVis.Source.converters.date = function (cell, field, fti, info) {
		cell.render = function (displayText) {
			var a = document.createElement('a');
			a.setAttribute('href', 'https://example.com/');
			a.innerText = displayText;
			return a;
		};
		return true; // conversion successful
	};

	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: '../../allowHtml.json',
		conversion: {'link3': ['link3'], 'link4': ['link4'], 'date': ['date']}
	});
	var view = new MIE.WC_DataVis.ComputedView(source, {
		prefs: prefs
	});
	new MIE.WC_DataVis.Grid({
		id: 'grid',
		computedView: view,
		table: {
			features: {
				limit: false,
				floatingHeader: false,
			},
			columns: [{
				field: 'link1',
				allowHtml: true
			}, {
				field: 'link2',
				allowHtml: true
			}, 'link3', 'link4', 'date']
		},
		prefs: prefs,
		source: source,
		advice: {
			setColConfig: {
				before: function (colConfig, from, grid) {
					if (from === 'prefs' && grid.initColConfig) {
						grid.logDebug(grid.makeLogTag('ADVICE // SETCOLCONFIG'), 'Replacing `allowHtml` in colConfig: %s', JSON.stringify(colConfig.asMap()));
						grid.initColConfig.each(function (v, k) {
							if (colConfig.isSet(k) && v.allowHtml) {
								colConfig.get(k).allowHtml = true;
							}
						});
						grid.logDebug(grid.makeLogTag('ADVICE // SETCOLCONFIG'), 'Finished replacement: %s', JSON.stringify(colConfig.asMap()));
					}
				}
			}
		}
	}, {
		title: 'Test - Grid - AllowHtml - Defn and Prefs',
		showControls: true
	});
});
		</script>
	</head>
	<body>
		<div id="grid"></div>
	</body>
</html>
