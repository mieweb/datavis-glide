<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script src="../../wcdatavis.js"></script>
		<link rel="stylesheet" href="../../font-awesome.css"/>
		<link rel="stylesheet" href="../../base.css"/>
		<link rel="stylesheet" href="../../wcdatavis.css"/>
		<script>
document.addEventListener('DOMContentLoaded', function () {
	MIE.DEBUGGING = true;

	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: '../../random100.json'
	});
	var view = new MIE.WC_DataVis.ComputedView(source);
	new MIE.WC_DataVis.Grid({
		id: 'test-grid-active-row-default-slider',
		computedView: view,
		table: {
			features: {
				limit: false,
				rowSelect: true,
				activeRow: true,
			},
			activeRow: {
				slider: true
			},
			columns: [
					'rowId'
				, 'string1'
				, 'country'
				, 'state'
				, 'fruit'
				, 'link'
				, 'int1'
				, 'float1'
				, 'currency1'
				, 'date1'
				, 'time1'
				, 'datetime1'
				, 'fixedPrecision1'
				, 'boolean1'
				, 'duration1'
			]
		}
	}, {
		title: 'Test - Grid - Active Row',
		showControls: true
	});
});
		</script>
	</head>
	<body>
		<div id="test-grid-active-row-default-slider"></div>
	</body>
</html>
