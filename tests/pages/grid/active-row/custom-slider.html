<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script src="../../wcdatavis.js"></script>
		<link rel="stylesheet" href="../../font-awesome.css"/>
		<link rel="stylesheet" href="../../base.css"/>
		<link rel="stylesheet" href="../../wcdatavis.css"/>
		<script>
document.addEventListener('DOMContentLoaded', function () {
	MIE.DEBUGGING = true;

	const $ = MIE.WC_DataVis.jQuery;
	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: '../../random100.json'
	});
	var view = new MIE.WC_DataVis.ComputedView(source);
	new MIE.WC_DataVis.Grid({
		id: 'test-grid-active-row-custom-slider',
		computedView: view,
		table: {
			features: {
				limit: false,
				rowSelect: true,
				activeRow: true,
			},
			activeRow: {
				callback: function ({rowId, rowData, slider, tableRenderer}) {
					slider.setHeader(`Row [${rowId}]`);
					var output = {};
					['date1', 'country', 'fruit', 'currency1'].forEach((k) => {
						output[k] = rowData[k].cachedRender || rowData[k].value || rowData[k].orig
					});
					slider.setBody(
						$('<div>')
						.append($(`<p>On ${output.date1}, me and Jimmy went to ${output.country} and bought ${output.currency1} worth of ${output.fruit}.</p>`))
						.append(
							$(`<div style="text-align: right">`)
							.append($(`<button type="button">Next Row</button>`).on('click', () => {
								tableRenderer.activeRowNext();
							}))
							.append(' ')
							.append($(`<button type="button">Close</button>`).on('click', () => {
								slider.hide();
							}))
						)
					);
				}
			},
			columns: [
					'rowId'
				, 'string1'
				, 'country'
				, 'state'
				, 'fruit'
				, 'link'
				, 'int1'
				, 'float1'
				, 'currency1'
				, 'date1'
				, 'time1'
				, 'datetime1'
				, 'fixedPrecision1'
				, 'boolean1'
				, 'duration1'
			]
		}
	}, {
		title: 'Test - Grid - Active Row',
		showControls: true
	});
});
		</script>
	</head>
	<body>
		<div id="test-grid-active-row-custom-slider"></div>
	</body>
</html>
