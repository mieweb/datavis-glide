<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script src="../wcdatavis.js"></script>
		<link rel="stylesheet" href="../base.css"/>
		<link rel="stylesheet" href="../wcdatavis.css"/>
		<script>
document.addEventListener('DOMContentLoaded', function () {
	MIE.DEBUGGING = true;

	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: '../fruit.csv'
	}, null, {
		'Date': {
			type: 'date',
			format: 'M/D/YYYY'
		}
	});
	var view = new MIE.WC_DataVis.ComputedView(source);
	new MIE.WC_DataVis.Graph('graph', view, null, {
		title: 'Test - Graph - Google',
		renderer: 'google'
	});
	new MIE.WC_DataVis.Grid({
		id: 'grid',
		computedView: view,
		table: {
			features: {
				limit: false,
				rowSelect: true,
			}
		},
		source: source,
	}, {
		title: 'Test - Graph - Google',
		showControls: true
	});
});
		</script>
	</head>
	<body>
		<div id="graph" style="height: 400px"></div>
		<div id="grid"></div>
	</body>
</html>
