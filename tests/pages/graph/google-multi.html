<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<script type="module" src="/index.js"></script>
		<link rel="stylesheet" href="../font-awesome.css"/>
		<link rel="stylesheet" href="../base.css"/>
		<link rel="stylesheet" href="../wcdatavis.css"/>
		<script type="module">
import { Source, ComputedView, Grid, Graph, Prefs } from '/index.js';
document.addEventListener('DOMContentLoaded', function () {
	var prefs = new Prefs('TEST:GRAPH:GOOGLE:MULTI', null, {
		backend: {
			type: 'temporary'
		}
	});
	var agg = [{
		fun: 'count'
	}, {
		fun: 'sum',
		fields: ['Amount']
	}];
	prefs.addPerspective(null, 'Primary', {
		view: {
			group: {
				fieldNames: ['Category']
			},
			pivot: {
				fieldNames: ['Product']
			},
			aggregate: {
				group: agg,
				pivot: agg,
				cell: agg,
				all: agg
			}
		}
	});
	var source = new Source({
		type: 'http',
		url: '../fruit.csv'
	}, null, {
		'Date': {
			type: 'date',
			format: 'M/D/YYYY'
		}
	});
	var view = new ComputedView(source, {
		prefs: prefs
	});
	new Graph('multi-graph-1', view, {
		whenPivot: {
			graphType: 'pie',
			aggNum: 1,
			aggType: 'pivot'
		}
	}, {
		title: 'Test - Graph - Google №1',
		renderer: 'google'
	});
	new Graph('multi-graph-2', view, {
		whenPivot: {
			graphType: 'pie',
			aggNum: 1,
			aggType: 'pivot'
		}
	}, {
		title: 'Test - Graph - Google №2',
		renderer: 'google'
	});
	new Grid({
		id: 'grid',
		computedView: view,
		prefs: prefs,
		table: {
			features: {
				limit: false,
				rowSelect: true,
			}
		},
		source: source,
	}, {
		title: 'Test - Graph - Google',
		showControls: true
	});
});
		</script>
	</head>
	<body>
		<div id="multi-graph-1" style="height: 800px"></div>
		<div id="multi-graph-2" style="height: 800px"></div>
		<div id="grid"></div>
	</body>
</html>
